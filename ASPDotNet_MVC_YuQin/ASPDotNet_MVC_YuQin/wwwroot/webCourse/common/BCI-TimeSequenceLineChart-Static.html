// 2. 解析 CSV 数据
function parseCSV(csvText) {
    const lines = csvText.trim().split('\n');
    const headers = lines[0].split('\t');
    const timeIndex = headers.indexOf('TimeSeqence');
    
    const times = [];
    const seriesData = {};
    
    // 初始化系列数据容器
    headers.forEach((h, i) => {
        if (i !== timeIndex) seriesData[h] = [];
    });

    for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].split('\t');
        if (cols.length < headers.length) continue;
        
        times.push(cols[timeIndex]);
        headers.forEach((h, idx) => {
            if (idx !== timeIndex) {
                seriesData[h].push(Number(cols[idx]));
            }
        });
    }
    return { times, headers: headers.filter(h => h !== 'TimeSeqence'), seriesData };
}

const parsed = parseCSV(csvData);

// 3. 构建 ECharts 配置项
const option = {
    title: { text: '脑波时序数据分析', left: 'center' },
    tooltip: { trigger: 'axis' },
    legend: { 
        data: parsed.headers, 
        bottom: 0, 
        type: 'scroll' 
    },
    grid: { left: '3%', right: '4%', bottom: '12%', containLabel: true },
    toolbox: { feature: { saveAsImage: {} } },
    xAxis: { 
        type: 'category', 
        boundaryGap: false, 
        data: parsed.times,
        axisLabel: { rotate: 30 }
    },
    yAxis: { type: 'value', name: '数值' },
    dataZoom: [

    ],
    series: parsed.headers.map(name => ({
        name: name,
        type: 'line',
        smooth: true,
        symbol: 'none',
        sampling: 'lttb',
        data: parsed.seriesData[name]
    }))
};
