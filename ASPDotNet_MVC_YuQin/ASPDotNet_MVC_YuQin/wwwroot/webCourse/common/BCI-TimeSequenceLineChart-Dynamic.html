// ============ CSV 解析 ============
function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = lines[0].split('\t');
    const timeIdx = headers.indexOf('TimeSeqence');
    const times = [];
    const seriesMap = {};
    headers.forEach((h, i) => { if (i !== timeIdx) seriesMap[h] = []; });

    for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].split('\t');
        if (cols.length < headers.length) continue;
        times.push(cols[timeIdx]);
        headers.forEach((h, idx) => {
            if (idx !== timeIdx) seriesMap[h].push(Number(cols[idx]));
        });
    }
    return { times, names: headers.filter(h => h !== 'TimeSeqence'), seriesMap };
}

const data = parseCSV(csvData);
const WINDOW_SIZE = 30; // 可视窗口保留的数据点数

// ============ ECharts 初始化 ============
const chart = echarts.init(document.getElementById('chart-container'));

const makeSeries = () => data.names.map(name => ({
    name, type: 'line', smooth: true, symbol: 'circle', symbolSize: 6,
    showSymbol: false, lineStyle: { width: 2 },
    emphasis: { focus: 'series' },
    data: []
}));

const option = {
    backgroundColor: 'transparent',
    title: { text: '🧠 脑波实时监测', left: 'center', textStyle: { color: '#e94560' } },
    tooltip: { trigger: 'axis', backgroundColor: 'rgba(22,33,62,0.9)', borderColor: '#e94560', textStyle: { color: '#eee' } },
    legend: { data: data.names, bottom: 0, textStyle: { color: '#aaa' }, type: 'scroll' },
    grid: { left: '3%', right: '4%', bottom: '14%', top: '12%', containLabel: true },
    xAxis: {
        type: 'category', boundaryGap: false, data: [],
        axisLine: { lineStyle: { color: '#444' } },
        axisLabel: { color: '#aaa', rotate: 30 }
    },
    yAxis: {
        type: 'value', splitLine: { lineStyle: { color: '#2a2a4a' } },
        axisLabel: { color: '#aaa' }
    },
    series: makeSeries()
};
chart.setOption(option);
window.addEventListener('resize', () => chart.resize());

// ============ 动态播放引擎 ============
let timer = null;
let currentIndex = 0;
let speed = 300;

function pushPoint() {
    if (currentIndex >= data.times.length) { stop(); return; }

    const t = data.times[currentIndex];
    const newSeriesData = data.names.map(name => data.seriesMap[name][currentIndex]);

    // 获取当前图表中的已有数据
    const curOpt = chart.getOption();
    const xData = [...curOpt.xAxis[0].data, t];
    const seriesArr = curOpt.series.map((s, i) => [...s.data, newSeriesData[i]]);

    // 滑动窗口：超出时移除头部旧数据
    if (xData.length > WINDOW_SIZE) {
        xData.shift();
        seriesArr.forEach(arr => arr.shift());
    }

    chart.setOption({
        xAxis: { data: xData },
        series: seriesArr.map((d, i) => ({ data: d }))
    });

    currentIndex++;
}

function start() {
    if (timer) return;
    timer = setInterval(pushPoint, speed);
}
function stop() {
    clearInterval(timer);
    timer = null;
}
function reset() {
    stop();
    currentIndex = 0;
    chart.setOption({
        xAxis: { data: [] },
        series: data.names.map(() => ({ data: [] }))
    });
}

// ============ 控件绑定 ============
document.getElementById('btnStart').onclick = start;
document.getElementById('btnStart').click();
document.getElementById('btnPause').onclick = stop;
document.getElementById('btnReset').onclick = reset;

const speedRange = document.getElementById('speedRange');
const speedVal = document.getElementById('speedVal');
speedRange.oninput = function () {
    // range值越小越快，反转映射使滑块右移=加速
    speed = 1050 - Number(this.value);
    speedVal.textContent = speed + 'ms';
    if (timer) { stop(); start(); }
};
